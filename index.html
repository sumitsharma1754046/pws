<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiggy</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
  
    <div class="container">
         <aside class="aside_left">
            <img src="https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto/portal/testing/seo-home/Veggies_new.png" 
             alt="home" class="aside__left__img" />
        </aside>
        <header>
            <nav class="header__nav">
                <div class="header__nav__1">
                    <a href="#">
                        <img 
                            src="https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto/portal/static-assets/images/swiggy_logo_white.png" alt="swiggy_logo" class="header__nav__logo" />
                    </a>
                </div>
                <div class="header__nav__2">
                    <a href="#">Swiggy Corporate</a>
                    <a href="#">Partner with us</a>
                    <button id="header__nav__gettheapp">Get the App</button>
                    <button id="header__nav__signin">Sign In</button>
                </div>
                
            </nav>
        <div class="header__content">
            <div class="header__content__mid">
                <div class="header__content__1">  
                    Order food. Discover <br>best restaurants. Swiggy it!    
                </div>
                <div class="header__content__2">  
                    <input type="text" placeholder="Enter your delivery location" id="header__content__2__input1" />
                    <input type="text" id="header__content__2__input2" placeholder="Search for restaurant, cuisine or a dish" />
                </div>
            </div>
             
        </div>
        <div class="header__cards">
            <div class="header__cards__card1">
                <img src="https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto/MERCHANDISING_BANNERS/IMAGES/MERCH/2024/7/23/ec86a309-9b06-48e2-9adc-35753f06bc0a_Food3BU.png"
                alt="card1" class="header__cards__card__img">
            </div>
            <div class="header__cards__card2">
                <img src="https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto/MERCHANDISING_BANNERS/IMAGES/MERCH/2024/7/23/ec86a309-9b06-48e2-9adc-35753f06bc0a_Food3BU.png"
                alt="card1" class="header__cards__card__img">
            </div>
            <div class="header__cards__card3">
                <img src="https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto/MERCHANDISING_BANNERS/IMAGES/MERCH/2024/7/23/ec86a309-9b06-48e2-9adc-35753f06bc0a_Food3BU.png"
                alt="card1" class="header__cards__card__img">
            </div>
        </div>
        </header>
        <aside class="aside_right">
                    <img src="https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto/portal/testing/seo-home/Sushi_replace.png" 
                    alt="home" class="aside__right__img" />
        </aside>
    </div>
    

</body>
</html>
